name: Goldset Eval (dogfood)

# Runs Goldset against its own evals/ suite on every PR. This is the live proof
# that the Action evaluates real evals, gates the merge on failure, and posts a
# results + delta comment on the PR.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    name: Run Goldset on itself
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Goldset
        id: goldset
        uses: ./
        with:
          eval-dir: evals
          # Set to 'openai' or 'anthropic' and add the matching key under env:
          # to let your .eval.ts judges call a provider. The dogfood suite is
          # hermetic, so 'none' is correct here.
          judge-provider: none
          fail-on-regression: true
          comment-on-pr: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show results path
        run: |
          echo "results: ${{ steps.goldset.outputs.results-path }}"
          echo "all-passed: ${{ steps.goldset.outputs.all-passed }}"
