name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint || true
      - run: npx tsc --noEmit
      - run: npm test -- --coverage
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Dogfood — runs Goldset against its own sample evals to make sure the
  # action + runners actually work end-to-end on a fresh checkout
  dogfood:
    name: Dogfood (self-eval)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 8
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_CI }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Run sample eval
        run: npx tsx examples/customer-support/customer-support.eval.ts

  # TODO: re-add publish-docs job once docs-site/ is scaffolded

  # Publish to npm on tag — provenance-signed
  publish-npm:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, dogfood]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}