name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC — catch dep-bump regressions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --coverage
      - name: Coverage gate (>= 60% statements)
        if: matrix.node == 20
        run: |
          node -e "
            const c = require('./coverage/coverage-summary.json');
            const s = c.total.statements.pct;
            if (s < 60) { console.error('coverage', s, '< 60'); process.exit(1); }
            console.log('coverage', s, '>= 60 ok');
          "
      - run: npm run build

      - if: matrix.node == 20
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Dogfood — runs the built Goldset Action against Goldset's own evals/ suite
  # on a fresh checkout. If Goldset can't pass its own evals, this fails.
  dogfood:
    name: Dogfood (self-eval via the Action)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Run Goldset on itself
        uses: ./
        with:
          eval-dir: evals
          judge-provider: none
          fail-on-regression: true
          comment-on-pr: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to npm on tag — provenance-signed
  publish-npm:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, dogfood]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
