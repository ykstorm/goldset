name: 'Test Public Action'

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test-action:
    name: Run Goldset action against a fixture eval dir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build

      - name: Run Goldset action (fixtures/evals)
        id: goldset
        uses: ./
        with:
          eval-dir: fixtures/evals
          judge-provider: none
          fail-on-regression: false
          comment-on-pr: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify outputs
        run: |
          echo "passed=${{ steps.goldset.outputs.passed }}"
          echo "failed=${{ steps.goldset.outputs.failed }}"
          echo "total=${{ steps.goldset.outputs.total }}"
          echo "all-passed=${{ steps.goldset.outputs.all-passed }}"
          test "${{ steps.goldset.outputs.all-passed }}" = "true"
          echo "Self-test complete."
